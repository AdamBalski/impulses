services:
  app:
    build:
      context: ..
      dockerfile: ./Dockerfile.app
    environment:
      PORT: "8000"
      SQLITE_DB_PATH: /app/server/data-store/impulses.sqlite3
      SESSION_TTL_SEC: "1800"
      ORIGIN: http://app:8000
      ORIGIN_API: http://app:8000
      GOOGLE_OAUTH2_CREDS: '{}'
    volumes:
      - app_test_data:/app/server/data-store
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz | grep -q 'UP'"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - impulses-test

  tester:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../:/workspace:ro
    environment:
      BASE_URL: http://app:8000
      TEST_ARGS: ${TEST_ARGS:-}
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["bash", "-lc"]
    command: >
      "pip install --no-cache-dir requests && \
       python system-tests/run_all.py $TEST_ARGS"
    networks:
      - impulses-test

volumes:
  app_test_data:

networks:
  impulses-test:
    driver: bridge
