services:
  app:
    build:
      context: ..
      dockerfile: ./Dockerfile.app
    container_name: impulses-app
    ports:
      - "8000:8000"
    environment:
      SQLITE_DB_PATH: /app/server/data-store/impulses.sqlite3
      SESSION_TTL_SEC: 1800
      PORT: 8000
      ORIGIN: ${ORIGIN:-http://localhost:3001}
      ORIGIN_API: ${ORIGIN_API:-http://localhost:8000}
      GOOGLE_OAUTH2_CREDS: "{}"
    volumes:
      - ..:/app
      - app_data:/app/server/data-store
    networks:
      - impulses-network
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: ./sandbox/Dockerfile.ui
    container_name: impulses-ui
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ..:/app
      - ui_node_modules:/app/ui/node_modules
      - sdk_node_modules:/app/client-sdks/typescript/node_modules
    networks:
      - impulses-network

volumes:
  app_data:
    driver: local
  ui_node_modules:
    driver: local
  sdk_node_modules:
    driver: local

networks:
  impulses-network:
    driver: bridge
